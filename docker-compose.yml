version: '3.8'
services:
  diffusion-env:
    build: .
    # 宣告這台容器需要使用 GPU 資源
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    # Volume 映射：左邊是本機路徑，右邊是容器內路徑
    volumes:
      # 將當前專案目錄映射進去，你在本機存檔，容器內立刻生效
      - ./:/workspace
      # 將 Hugging Face 的模型快取對應到外部。
      # 這樣幾十 GB 的模型載過一次就會存在伺服器上，刪掉容器重開也不用重新下載。
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "7860:7860" # 預留給之後開 Gradio 網頁介面 或 Jupyter 測試的 Port
      - "8888:8888"
    tty: true
    stdin_open: true
